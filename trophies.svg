  <rect width="122.0" height="130" rx="14" fill="#071B2E" stroke="#00E5FF" stroke-width="1"/>
  <rect width="122.0" height="130" rx="14" fill="none" stroke="#32F5FF" stroke-width="1" opacity="0">
