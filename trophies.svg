  <text x="61.0" y="70" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#EAFBFF" filter="url(#glow)">19</text>
  <text x="61.0" y="92" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" letter-spacing="0.5" fill="#00E5FF">REPOSITORIES</text>
  <text x="61.0" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#7FD8E8">Public projects shipped</text>
  <rect x="-40" y="0" width="30" height="130" fill="#FFFFFF" opacity="0.06" transform="skewX(-16)">
    <animate attributeName="x" values="-40;152.0" dur="3.5s" begin="1.20s" repeatCount="indefinite"/>
  </rect>
</g>
<g transform="translate(157.0,56)" opacity="0">
