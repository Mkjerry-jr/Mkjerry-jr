  <rect width="122.0" height="130" rx="14" fill="none" stroke="#32F5FF" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0.15;0.55;0.15" dur="3s" begin="0.00s" repeatCount="indefinite"/>
  </rect>
  <polygon points="52.0,18 70.0,18 67.0,34 55.0,34"
