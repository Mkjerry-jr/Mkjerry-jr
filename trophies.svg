<svg width="720" height="210" viewBox="0 0 720 210" xmlns="http://www.w3.org/2000/svg">
<title>Manoj Kumar K - Milestone Badges</title>

<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#05070A"/>
    <stop offset="100%" stop-color="#071B2E"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00E5FF"/>
    <stop offset="100%" stop-color="#009DFF"/>
  </linearGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="hex" width="34" height="40" patternUnits="userSpaceOnUse">
    <polygon points="17,1 32,10 32,27 17,36 2,27 2,10" fill="none" stroke="#00E5FF" stroke-width="0.6"/>
  </pattern>
</defs>

<rect width="720" height="210" rx="16" fill="url(#bgGrad)" stroke="#00E5FF" stroke-width="1.2"/>
<rect width="720" height="210" rx="16" fill="url(#hex)" opacity="0.12"/>
<text x="20" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#EAFBFF" letter-spacing="1" filter="url(#glow)">MILESTONE BADGES</text>
<line x1="20" y1="40" x2="700" y2="40" stroke="#00E5FF" stroke-opacity="0.35"/>

<g transform="translate(20.0,56)" opacity="0">
  <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.00s" fill="freeze"/>
