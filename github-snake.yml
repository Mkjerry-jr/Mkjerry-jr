name: Generate Contribution Snake

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate-snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate aqua/cyan glowing snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: mkjerry-jr
          outputs: |
            dist/github-snake.svg?color_snake=%2300E5FF&color_dots=%23071B2E,%230A2A44,%230F4C68,%2300B8CC,%2300E5FF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2332F5FF
            dist/github-snake.gif?color_snake=%2300E5FF&color_dots=%23071B2E,%230A2A44,%230F4C68,%2300B8CC,%2300E5FF

      - name: Push generated files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
