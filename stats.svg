<svg width="480" height="220" viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg">
<title>Manoj Kumar K - GitHub Stats</title>

<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#05070A"/>
    <stop offset="100%" stop-color="#071B2E"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00E5FF"/>
    <stop offset="100%" stop-color="#009DFF"/>
  </linearGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="hex" width="34" height="40" patternUnits="userSpaceOnUse">
    <polygon points="17,1 32,10 32,27 17,36 2,27 2,10" fill="none" stroke="#00E5FF" stroke-width="0.6"/>
  </pattern>
</defs>

<rect width="480" height="220" rx="16" fill="url(#bgGrad)" stroke="#00E5FF" stroke-width="1.2"/>
<rect width="480" height="220" rx="16" fill="url(#hex)" opacity="0.12"/>
<text x="20" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#EAFBFF" letter-spacing="1" filter="url(#glow)">GITHUB STATISTICS</text>
<line x1="20" y1="40" x2="460" y2="40" stroke="#00E5FF" stroke-opacity="0.35"/>

<g transform="translate(65,130)">
  <circle r="34" fill="none" stroke="#071B2E" stroke-width="7"/>
  <circle r="34" fill="none" stroke="url(#barGrad)" stroke-width="7" stroke-linecap="round"
    stroke-dasharray="213.6" stroke-dashoffset="213.6" transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" values="213.6;0.0" dur="1.4s" begin="0.20s" fill="freeze"/>
  </circle>
  <text x="0" y="6" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="700" fill="#EAFBFF" opacity="0">
    19
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.20s" fill="freeze"/>
  </text>
  <text x="0" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#7FD8E8">Public Repositories</text>
</g>
<g transform="translate(170,130)">
  <circle r="34" fill="none" stroke="#071B2E" stroke-width="7"/>
  <circle r="34" fill="none" stroke="url(#barGrad)" stroke-width="7" stroke-linecap="round"
    stroke-dasharray="213.6" stroke-dashoffset="213.6" transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" values="213.6;128.2" dur="1.4s" begin="0.35s" fill="freeze"/>
  </circle>
  <text x="0" y="6" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="700" fill="#EAFBFF" opacity="0">
    5
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.35s" fill="freeze"/>
  </text>
  <text x="0" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#7FD8E8">Total Stars Earned</text>
</g>
<g transform="translate(275,130)">
  <circle r="34" fill="none" stroke="#071B2E" stroke-width="7"/>
  <circle r="34" fill="none" stroke="url(#barGrad)" stroke-width="7" stroke-linecap="round"
    stroke-dasharray="213.6" stroke-dashoffset="213.6" transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" values="213.6;59.8" dur="1.4s" begin="0.50s" fill="freeze"/>
  </circle>
  <text x="0" y="6" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="700" fill="#EAFBFF" opacity="0">
    9
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.50s" fill="freeze"/>
  </text>
  <text x="0" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#7FD8E8">Followers</text>
</g>
<g transform="translate(380,130)">
  <circle r="34" fill="none" stroke="#071B2E" stroke-width="7"/>
  <circle r="34" fill="none" stroke="url(#barGrad)" stroke-width="7" stroke-linecap="round"
    stroke-dasharray="213.6" stroke-dashoffset="213.6" transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" values="213.6;25.6" dur="1.4s" begin="0.65s" fill="freeze"/>
  </circle>
  <text x="0" y="6" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="700" fill="#EAFBFF" opacity="0">
    11
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.65s" fill="freeze"/>
  </text>
  <text x="0" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#7FD8E8">Following</text>
</g>

<g transform="translate(0,170)">
  <text x="20" y="0" font-family="Consolas, monospace" font-size="11" fill="#7FD8E8">GitHub member since Feb 2024 &#8226; Chennai, India &#8226; @mkjerry-jr</text>
  <rect x="20" y="10" width="440" height="6" rx="3" fill="#071B2E"/>
  <rect x="20" y="10" width="0" height="6" rx="3" fill="url(#barGrad)">
    <animate attributeName="width" values="0;440" dur="2s" begin="0.3s" fill="freeze"/>
  </rect>
</g>
</svg>