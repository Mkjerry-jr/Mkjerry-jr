<svg width="760" height="110" viewBox="0 0 760 110" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@font-face {
  font-family: 'Dancing Script';
  font-weight: 700;
  src: url(data:font/woff2;base64,) format('woff2');
}
</style>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#009DFF"/>
</linearGradient>
<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="3.4" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<text x="380.0" y="48" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="22" fill="url(#g)" filter="url(#glow)" opacity="0">
&#8220;Coding is an art, and I am the artist.&#8221;
<animate attributeName="opacity" values="0;1" dur="1.2s" begin="0.2s" fill="freeze"/>
</text>
<text x="380.0" y="85" text-anchor="middle" font-family="'Dancing Script', cursive" font-weight="700" font-size="30" fill="#32F5FF" opacity="0">
&#8212; MK Jerry
<animate attributeName="opacity" values="0;1;0.6;1" dur="2.4s" begin="1.4s" fill="freeze"/>
</text>
</svg>